<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auroramini</title>
    <style>
        :root {
            --bg-dark: #0f0f11;
            --bg-panel: #18181c;
            --border: #2a2a32;
            --text: #e3e3e6;
            --accent: #5ba4ff;
            --user-msg: #283547;
            --model-msg: #222226;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 0.5px; }

        .controls-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, input[type="password"] {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

        select {
            cursor: pointer;
            font-weight: 500;
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .mode-btn {
            background: transparent;
            color: #aaa;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0;
        }

        .mode-btn.active {
            background-color: var(--accent);
            color: #000;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
            will-change: scroll-position;
            contain: layout style;
            scroll-behavior: smooth; 
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            contain: content;
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: #fff;
        }

        .model-message {
            align-self: flex-start;
            background-color: var(--model-msg);
            border: 1px solid var(--border);
        }

        .generated-image {
            margin-top: 10px;
            max-width: 100%;
            max-height: 450px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: block;
        }

        footer {
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            z-index: 10;
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            height: 24px;
            outline: none;
            font-family: inherit;
        }

        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
</head>
<body>

    <header>
        <h1>Auroramini Terminal</h1>
        <div class="controls-group">
            <div class="mode-toggle">
                <button class="mode-btn active" id="chatModeBtn">Chat</button>
                <button class="mode-btn" id="imageModeBtn">Images</button>
            </div>
            
            <select id="modelSelect">
                <!-- keeping only the fresh supported standard production engine -->
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            </select>
            <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key (AQ....)">
        </div>
    </header>

    <main id="chatWindow">
        <div class="message model-message">ready! choose your mode, pick an engine model, and verify execution credentials.</div>
    </main>

    <footer>
        <form class="input-area" id="chatForm" onsubmit="return false;">
            <textarea id="userInput" placeholder="Type a message..."></textarea>
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </footer>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';

        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const modelSelect = document.getElementById('modelSelect');
        const chatModeBtn = document.getElementById('chatModeBtn');
        const imageModeBtn = document.getElementById('imageModeBtn');

        let chatHistory = [];
        let activeMode = 'chat';

        // keeping only stable active models
        const chatModels = [
            { val: "gemini-2.5-flash", name: "Gemini 2.5 Flash" }
        ];

        const imageModels = [
            { val: "imagen-3.0-generate-002", name: "Nano Banana" }
        ];

        chatModeBtn.addEventListener('click', () => switchMode('chat'));
        imageModeBtn.addEventListener('click', () => switchMode('image'));

        function switchMode(mode) {
            activeMode = mode;
            if (mode === 'chat') {
                chatModeBtn.classList.add('active');
                imageModeBtn.classList.remove('active');
                sendBtn.textContent = 'Send';
                userInput.placeholder = 'Type a message...';
                populateModels(chatModels);
            } else {
                imageModeBtn.classList.add('active');
                chatModeBtn.classList.remove('active');
                sendBtn.textContent = 'Generate';
                userInput.placeholder = 'Describe the image you want to create...';
                populateModels(imageModels);
            }
        }

        function populateModels(modelsList) {
            modelSelect.innerHTML = '';
            modelsList.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.val;
                opt.textContent = m.name;
                modelSelect.appendChild(opt);
            });
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                executePipeline();
            }
        });

        sendBtn.addEventListener('click', executePipeline);

        async function executePipeline() {
            const apiKey = apiKeyInput.value.trim();
            const text = userInput.value.trim();
            const selectedModel = modelSelect.value;

            if (!apiKey) return alert('API key required.');
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            
            sendBtn.disabled = true;
            userInput.disabled = true;

            const ai = new GoogleGenAI({ apiKey: apiKey });

            if (activeMode === 'chat') {
                chatHistory.push({ role: 'user', parts: [{ text: text }] });
                const responseNode = appendMessage('', 'model-message');
                
                try {
                    const responseStream = await ai.models.generateContentStream({
                        model: selectedModel,
                        contents: chatHistory,
                        config: {
                            systemInstruction: "CRITICAL SYSTEM PROTOCOL: You must write EVERYTHING in 100% lowercase letters. Do not capitalize the first letter of sentences, names, or pronouns. In addition, you must replace specific phrases with abbreviations: 'something' becomes 'smth', 'i don't know' becomes 'idk', and 'i don't care' becomes 'idc'. Keep everything short, lowercase, and relaxed."
                        }
                    });

                    let fullResponseText = "";
                    let renderPending = false;
                    
                    for await (const chunk of responseStream) {
                        fullResponseText += chunk.text;
                        if (!renderPending) {
                            renderPending = true;
                            requestAnimationFrame(() => {
                                responseNode.textContent = fullResponseText.toLowerCase();
                                const isNearBottom = chatWindow.scrollHeight - chatWindow.clientHeight - chatWindow.scrollTop < 150;
                                if (isNearBottom) chatWindow.scrollTop = chatWindow.scrollHeight;
                                renderPending = false;
                            });
                        }
                    }

                    setTimeout(() => {
                        const baseLower = fullResponseText.toLowerCase();
                        responseNode.textContent = baseLower;
                        chatHistory.push({ role: 'model', parts: [{ text: baseLower }] });
                    }, 50);

                } catch (error) {
                    responseNode.textContent = `[error!]: ${error.message.toLowerCase()}`;
                } finally {
                    unlockUI();
                }
            } else {
                const responseNode = appendMessage('generating visual matrix via nano-banana...', 'model-message');
                
                try {
                    const response = await ai.models.generateImages({
                        model: selectedModel,
                        prompt: text,
                        config: {
                            numberOfImages: 1,
                            outputMimeType: 'image/jpeg',
                            aspectRatio: '1:1'
                        }
                    });

                    responseNode.textContent = `image generated successfully via nano-banana for prompt: "${text.toLowerCase()}"`;
                    
                    const base64ImageBytes = response.generatedImages[0].image.imageBytes;
                    
                    const img = document.createElement('img');
                    img.className = 'generated-image';
                    img.src = `data:image/jpeg;base64,${base64ImageBytes}`;
                    responseNode.appendChild(img);
                    
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } catch (error) {
                    responseNode.textContent = `[error generating image]: ${error.message.toLowerCase()}`;
                } finally {
                    unlockUI();
                }
            }
        }

        function unlockUI() {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
