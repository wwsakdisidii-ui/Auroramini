<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auroramini</title>
    <style>
        :root {
            --bg-dark: #0f0f11;
            --bg-panel: #18181c;
            --border: #2a2a32;
            --text: #e3e3e6;
            --accent: #5ba4ff;
            --user-msg: #283547;
            --model-msg: #222226;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 0.5px; }

        input[type="password"] {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            width: 240px;
            font-size: 0.85rem;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
            will-change: scroll-position;
            contain: layout style;
            /* Added smooth scrolling behavior for browser adjustments */
            scroll-behavior: smooth; 
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            contain: content;
            /* Subtle fade-in animation when a bubble appears */
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            color: #fff;
        }

        .model-message {
            align-self: flex-start;
            background-color: var(--model-msg);
            border: 1px solid var(--border);
        }

        footer {
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            z-index: 10;
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        textarea {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            height: 24px;
            outline: none;
            font-family: inherit;
        }

        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
    </style>

    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
</head>
<body>

    <header>
        <h1>Auroramini Terminal (messages from user and Gemini will be here)</h1>
        <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key (AQ....)">
    </header>

    <main id="chatWindow">
        <div class="message model-message">Ready! Input your Google AI Studio API key. Slang rules are loaded!</div>
    </main>

    <footer>
        <form class="input-area" id="chatForm" onsubmit="return false;">
            <textarea id="userInput" placeholder="Type a message..."></textarea>
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </footer>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';

        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');

        let chatHistory = [];

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                streamPipeline();
            }
        });

        sendBtn.addEventListener('click', streamPipeline);

        async function streamPipeline() {
            const apiKey = apiKeyInput.value.trim();
            const text = userInput.value.trim();

            if (!apiKey) return alert('API key required.');
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            
            sendBtn.disabled = true;
            userInput.disabled = true;

            chatHistory.push({ role: 'user', parts: [{ text: text }] });

            const responseNode = appendMessage('', 'model-message');
            
            try {
                const ai = new GoogleGenAI({ apiKey: apiKey });
                
                const responseStream = await ai.models.generateContentStream({
                    model: 'gemini-2.5-flash',
                    contents: chatHistory,
                    config: {
                        systemInstruction: "CRITICAL: You must replace specific words with abbreviations. Instead of 'something', you MUST say 'smth'. Instead of 'i don't know', you MUST say 'idk'. Instead of 'i don't care', you MUST say 'idc'. Keep responses short and chill."
                    }
                });

                let fullResponseText = "";
                let renderPending = false;
                
                for await (const chunk of responseStream) {
                    fullResponseText += chunk.text;

                    if (!renderPending) {
                        renderPending = true;
                        requestAnimationFrame(() => {
                            responseNode.textContent = fullResponseText;
                            
                            // Smooth Auto-Scroll calculation
                            const isNearBottom = chatWindow.scrollHeight - chatWindow.clientHeight - chatWindow.scrollTop < 150;
                            if (isNearBottom) {
                                chatWindow.scrollTop = chatWindow.scrollHeight;
                            }
                            renderPending = false;
                        });
                    }
                }

                setTimeout(() => {
                    responseNode.textContent = fullResponseText;
                    chatHistory.push({ role: 'model', parts: [{ text: fullResponseText }] });
                }, 50);

            } catch (error) {
                responseNode.textContent = `[Error!]: ${error.message}`;
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
